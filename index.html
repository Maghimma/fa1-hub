<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FA1 Revision Hub</title>
<meta name="description" content="IGCSE Grade 9 FA1 revision — flashcards, quizzes and exam practice for all subjects. Made by Maghimma.">
<meta property="og:title" content="FA1 Revision Hub">
<meta property="og:description" content="Flashcards, quizzes and exam practice for every FA1 subject. Made by Maghimma.">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#faf9f7; --surf:#ffffff; --ink:#16181d; --mut:#6d7178; --line:#e7e5e1;
    --acc:#1f2430; --good:#1f9d63; --bad:#c8483f; --goodbg:#eaf6ef; --badbg:#fbeceb;
    --soft:#f3f2ef; --shadow:0 1px 2px rgba(20,22,28,.04),0 8px 24px rgba(20,22,28,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.55;min-height:100vh;padding-bottom:40px}
  .wrap{max-width:940px;margin:0 auto;padding:0 20px}
  .narrow{max-width:660px;margin:0 auto;padding:0 20px}

  /* top bar */
  .bar{position:sticky;top:0;z-index:20;background:rgba(250,249,247,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar .in{max-width:940px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.3px;cursor:pointer;color:var(--ink)}
  .brand .dot{color:var(--good)}
  .bar .who{margin-left:auto;font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:8px}
  .bar .who b{color:var(--ink);font-weight:700}
  .bar .who a{color:var(--mut);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
  .bar .who a:hover{color:var(--ink)}

  .top{padding:30px 0 4px}
  .kicker{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);font-weight:700}
  h1{font-size:30px;font-weight:800;letter-spacing:-.8px;margin-top:5px}
  .lead{color:var(--mut);font-size:14.5px;margin-top:6px;max-width:52ch}
  .prog{margin:22px 0 7px;font-size:12.5px;color:var(--mut);display:flex;justify-content:space-between;align-items:center}
  .barwrap{height:7px;background:var(--soft);border-radius:99px;overflow:hidden;margin-bottom:4px}
  .barwrap>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),#3a4356);transition:width .5s}

  /* subject grid */
  .subs{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:22px}
  .sub{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:.16s;text-align:left;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .sub:hover{border-color:var(--ink);transform:translateY(-3px)}
  .sub .code{font-size:10.5px;color:var(--mut);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
  .sub h3{font-size:17px;margin:4px 0 5px;font-weight:700;letter-spacing:-.3px}
  .sub .meta{font-size:12.5px;color:var(--mut);flex:1}
  .sub .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .pill{display:inline-block;font-size:10.5px;color:var(--mut);border:1px solid var(--line);border-radius:99px;padding:3px 9px;font-weight:600}
  .pill.hi{border-color:var(--acc);color:var(--ink);background:var(--soft)}

  .back{color:var(--mut);font-size:13px;cursor:pointer;display:inline-block;margin:26px 0 14px;font-weight:600}
  .back:hover{color:var(--ink)}
  .modes{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .mrow{display:flex;align-items:center;gap:14px;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:15px 16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
  .mrow:hover{border-color:var(--ink);transform:translateY(-2px)}
  .mrow .ic{font-size:21px;width:28px;text-align:center}
  .mrow h4{font-size:15px;font-weight:700}
  .mrow p{font-size:12px;color:var(--mut)}
  .mrow .arr{margin-left:auto;color:var(--mut)}

  .panel{background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:8px;box-shadow:var(--shadow)}
  .qmeta{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .q{font-size:17.5px;font-weight:700;letter-spacing:-.2px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:13px 15px;margin:8px 0;font-size:14px;font-weight:500;cursor:pointer;transition:.12s;font-family:inherit}
  .opt:hover{border-color:var(--ink)}
  .opt.good{border-color:var(--good);background:var(--goodbg)}
  .opt.bad{border-color:var(--bad);background:var(--badbg)}
  .opt:disabled{cursor:default}
  .chip{display:inline-block;padding:10px 14px;margin:6px 7px 0 0;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;font-family:inherit}
  .chip.sel{border-color:var(--ink);background:var(--soft)}
  .chip.good{border-color:var(--good);background:var(--goodbg)}
  .chip.bad{border-color:var(--bad);background:var(--badbg)}
  .tpick{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 4px}
  .tpick button{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--surf);color:var(--mut);cursor:pointer;font-family:inherit}
  .tpick button.on{border-color:var(--ink);color:var(--ink);background:var(--soft)}
  .fb{margin-top:14px;padding:12px 14px;border-radius:11px;font-size:13.5px;display:none}
  .fb.show{display:block}
  .fb.ok{background:var(--goodbg);border:1px solid var(--good)}
  .fb.no{background:var(--badbg);border:1px solid var(--bad)}
  .fb b{color:var(--ink)}
  .btn{background:var(--acc);color:#fff;border:none;border-radius:11px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;font-family:inherit;transition:.14s}
  .btn:hover{opacity:.92}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
  .btn.full{width:100%}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  /* flashcards */
  .flash{perspective:1400px;height:270px;margin-top:6px}
  .fi{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .flash.flip .fi{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:22px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--line);overflow:auto;background:var(--surf);box-shadow:var(--shadow)}
  .face.back{transform:rotateY(180deg);background:var(--soft)}
  .face .tag{font-size:10.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .face .txt{font-size:16px;font-weight:700}
  .face.back .txt{font-size:13.5px;font-weight:500;line-height:1.6}
  .face.back ul{margin:6px 0 0 16px}.face.back li{margin:3px 0}
  .hint{text-align:center;color:var(--mut);font-size:12px;margin-top:8px}

  /* exam mode */
  .ta{width:100%;min-height:120px;margin-top:14px;padding:13px 15px;border:1px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink);font-size:14px;font-family:inherit;line-height:1.55;resize:vertical}
  .ta:focus{outline:none;border-color:var(--ink)}
  .mans{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.6}
  .mans b{color:var(--ink)}
  .mans ul{margin:6px 0 0 18px}.mans li{margin:3px 0}

  .end{text-align:center;padding:26px 6px}
  .end .big{font-size:50px;font-weight:800;margin:4px 0;letter-spacing:-1.5px}
  .streak{color:var(--ink);font-weight:700}
  .foot{margin-top:40px;text-align:center;color:var(--mut);font-size:11.5px;line-height:1.8}
  .foot b{color:var(--ink);font-weight:700}

  /* welcome */
  .welcome{max-width:440px;margin:0 auto;padding:64px 20px;text-align:center}
  .welcome .emoji{font-size:40px}
  .welcome h1{font-size:32px;margin-top:14px}
  .welcome p{color:var(--mut);font-size:14.5px;margin-top:8px}
  .welcome input{width:100%;margin-top:22px;padding:14px 16px;border:1px solid var(--line);border-radius:13px;font-size:16px;font-family:inherit;text-align:center;background:var(--surf)}
  .welcome input:focus{outline:none;border-color:var(--ink)}

  @media(min-width:560px){h1{font-size:34px}}
  @media(max-width:400px){.bar .who b{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}}
</style>
</head>
<body>
<div id="bar"></div>
<div id="app"></div>
<script src="data.js"></script>
<script>
const ISSUES={rsi:"RSI",back:"Back/Neck",eye:"Eyestrain",head:"Headaches"};
const app=document.getElementById('app');
const bar=document.getElementById('bar');
let NAME=null, ST={};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a;};

/* ---- per-name progress ---- */
function load(){try{ST=JSON.parse(localStorage.getItem('fa1_prog_'+NAME)||'{}')||{};}catch(e){ST={};}}
function save(){try{localStorage.setItem('fa1_prog_'+NAME,JSON.stringify(ST));}catch(e){}}
function st(k){return ST[k]||(ST[k]={a:0,c:0});}
function subPct(k){const o=ST[k];return o&&o.a?Math.round(o.c/o.a*100):0;}
function tot(){let a=0,c=0;for(const k in ST){a+=ST[k].a;c+=ST[k].c;}return{a,c,p:a?Math.round(c/a*100):0};}
function score(ok,k){const o=st(k);o.a++;if(ok)o.c++;save();}
function reset(){if(confirm('Reset '+NAME+"'s progress across every subject?")){ST={};save();home();}}
function switchUser(){document.onkeydown=null;localStorage.removeItem('fa1_name');NAME=null;welcome();}

function drawBar(){
  if(!NAME){bar.innerHTML='';return;}
  bar.className='bar';
  bar.innerHTML=`<div class="in"><span class="brand" onclick="home()">FA1 <span class="dot">·</span> Revision Hub</span>
    <span class="who">Hi <b>${esc(NAME)}</b> · <a onclick="switchUser()">switch</a></span></div>`;
}

/* ---- onboarding ---- */
function welcome(){
  document.onkeydown=null;bar.innerHTML='';bar.className='';
  app.innerHTML=`<div class="welcome">
    <div class="emoji">✨</div>
    <h1>FA1 Revision Hub</h1>
    <p>Flashcards, quizzes and exam practice for every subject. What should I call you? Your progress saves on this device.</p>
    <input id="nm" placeholder="Your first name" autocomplete="given-name" maxlength="24" />
    <button class="btn full" id="go" style="margin-top:16px">Start revising →</button>
    <div class="foot" style="margin-top:26px">Made by Maghimma</div>
  </div>`;
  const nm=document.getElementById('nm');nm.focus();
  const start=()=>{const v=nm.value.trim();if(!v){nm.focus();return;}
    NAME=v.slice(0,24);localStorage.setItem('fa1_name',NAME);load();home();};
  document.getElementById('go').onclick=start;
  nm.onkeydown=e=>{if(e.key==='Enter')start();};
}

/* ---- home ---- */
function home(){
  document.onkeydown=null;drawBar();
  const T=tot();
  app.innerHTML=`<div class="wrap top">
    <div class="kicker">IGCSE · Grade 9 · FA1</div>
    <h1>Revision Hub</h1>
    <div class="lead">Every subject, your exact portions — built to drill, not just read.</div>
    <div class="prog"><span>${NAME}'s overall accuracy</span><span><b>${T.p}%</b> · ${T.c}/${T.a}</span></div>
    <div class="barwrap"><i style="width:${T.p}%"></i></div>
    <div class="subs" id="subs"></div>
    <div class="foot">Exams 20–24 July · flashcards + quizzes + exam practice for all 7 papers<br>
      🧪 <a href="https://dabble-sim.vercel.app" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:2px;font-weight:600">Interactive sims on Dabble →</a><br>
      <b>Made by Maghimma</b>${T.a?` · <span onclick="reset()" style="cursor:pointer;text-decoration:underline">reset progress</span>`:''}</div>
  </div>`;
  const g=document.getElementById('subs');
  ORDER.forEach(k=>{const s=DATA[k];const el=document.createElement('div');el.className='sub';el.onclick=()=>subject(k);
    const done=ST[k]&&ST[k].a;
    el.innerHTML=`<div class="code">${s.code}</div><h3>${s.name}</h3><div class="meta">${s.blurb}</div>
      <div class="tags"><span class="pill">${s.cards.length} cards</span><span class="pill">${s.quiz.length} quiz</span>${s.exam?`<span class="pill">${s.exam.length} exam</span>`:''}${done?`<span class="pill hi">${subPct(k)}%</span>`:''}</div>`;
    g.appendChild(el);});
}

/* ---- subject ---- */
function subject(k){
  document.onkeydown=null;drawBar();
  const s=DATA[k];
  let modes=[{ic:"🃏",h:"Flashcards",p:`${s.cards.length} cards, flip to recall`,go:()=>flash(k)},
    {ic:"⚡",h:"Quiz",p:`${s.quiz.length} questions + streak`,go:()=>mcq(k,s.quiz,"Quiz")}];
  if(s.exam)modes.push({ic:"📝",h:"Exam Practice",p:`${s.exam.length} written questions, self-marked`,go:()=>exam(k)});
  if(s.speak)modes.push({ic:"🗣️",h:"Speaking Q&amp;A",p:`${s.speak.length} teacher-style questions — type your answer`,go:()=>speakqa(k)});
  if(s.fixes)modes.push({ic:"🪣",h:"Fix Sorter",p:"Match fix → health issue",go:()=>bucket(k)});
  if(s.scen)modes.push({ic:"🎯",h:"Scenario Spotter",p:"Specific answer, not generic",go:()=>mcq(k,s.scen,"Scenario Spotter")});
  const papers=(s.papers||[]).map(p=>`<a href="${p.url}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:2px">${p.name}</a>`).join(' · ');
  app.innerHTML=`<div class="narrow"><span class="back" onclick="home()">← all subjects</span>
    <div class="kicker">${s.code}</div><h1>${s.name}</h1><div class="lead">${s.blurb}</div>
    ${ST[k]&&ST[k].a?`<div class="prog"><span>This subject</span><span><b>${subPct(k)}%</b> · ${ST[k].c}/${ST[k].a}</span></div><div class="barwrap"><i style="width:${subPct(k)}%"></i></div>`:''}
    <div class="modes" id="m"></div>
    ${papers?`<div style="margin-top:18px;padding:14px 16px;background:var(--surf);border:1px solid var(--line);border-radius:13px;font-size:13px;color:var(--mut)">📄 <b style="color:var(--ink)">Past papers &amp; topic questions:</b><br>${papers}</div>`:''}</div>`;
  const m=document.getElementById('m');
  modes.forEach(md=>{const r=document.createElement('div');r.className='mrow';r.onclick=md.go;
    r.innerHTML=`<div class="ic">${md.ic}</div><div><h4>${md.h}</h4><p>${md.p}</p></div><div class="arr">→</div>`;m.appendChild(r);});
}

/* ---- flashcards ---- */
function flash(k){
  const s=DATA[k];const topics=["All",...[...new Set(s.cards.map(c=>c.t))]];
  let tf="All",deck=shuffle(s.cards),i=0;
  const build=()=>{deck=tf==="All"?shuffle(s.cards):shuffle(s.cards.filter(c=>c.t===tf));i=0;render();};
  function render(){const c=deck[i];
    app.innerHTML=`<div class="narrow"><span class="back" onclick="subject('${k}')">← ${s.name}</span>
      <div class="qmeta">Flashcards</div><div class="tpick" id="tp"></div>
      <div class="flash" onclick="this.classList.toggle('flip')"><div class="fi">
        <div class="face"><div class="tag">${c.t}</div><div class="txt">${c.f}</div></div>
        <div class="face back"><div class="tag">Answer</div><div class="txt">${c.b}</div></div></div></div>
      <div class="hint">card ${i+1}/${deck.length} · tap to flip · space / ← →</div>
      <div class="row" style="margin-top:14px"><button class="btn ghost" id="pv">← back</button><button class="btn" id="nx">next →</button></div></div>`;
    const tp=document.getElementById('tp');
    topics.forEach(t=>{const b=document.createElement('button');b.textContent=t;if(t===tf)b.className='on';b.onclick=()=>{tf=t;build();};tp.appendChild(b);});
    document.getElementById('pv').onclick=()=>{if(i>0){i--;render();}};
    document.getElementById('nx').onclick=()=>{if(i<deck.length-1){i++;render();}else subject(k);};
    document.onkeydown=(e)=>{
      if(e.key===' '){e.preventDefault();document.querySelector('.flash').classList.toggle('flip');}
      else if(e.key==='ArrowRight')document.getElementById('nx').click();
      else if(e.key==='ArrowLeft')document.getElementById('pv').click();};
  }
  render();
}

/* ---- multiple choice (quiz + scenario) ---- */
function mcq(k,list,title){
  const s=DATA[k];let deck=shuffle(list),i=0,streak=0,best=0,locked=false;
  function render(){const it=deck[i];
    app.innerHTML=`<div class="narrow"><span class="back" onclick="subject('${k}')">← ${s.name}</span>
      <div class="qmeta">${title} · ${i+1}/${deck.length} ${streak>1?`· <span class="streak">🔥 ${streak}</span>`:''}</div>
      <div class="panel"><div class="q">${it.q}</div><div id="o" style="margin-top:12px"></div>
      <div class="fb" id="fb"></div><button class="btn" id="nx" style="display:none">${i<deck.length-1?'Next →':'Results'}</button></div></div>`;
    const o=document.getElementById('o');
    const order=shuffle(it.o.map((_,idx)=>idx));
    order.forEach((origIdx,pos)=>{const b=document.createElement('button');b.className='opt';b.textContent=(pos+1)+'.  '+it.o[origIdx];b.dataset.oi=origIdx;
      b.onclick=()=>{if(locked)return;locked=true;const ok=origIdx===it.a;score(ok,k);
        if(ok){streak++;best=Math.max(best,streak);}else streak=0;
        document.querySelectorAll('.opt').forEach(e=>{e.disabled=true;const oi=+e.dataset.oi;if(oi===it.a)e.classList.add('good');else if(oi===origIdx&&!ok)e.classList.add('bad');});
        const fb=document.getElementById('fb');fb.className='fb show '+(ok?'ok':'no');fb.innerHTML=(ok?'✓ ':'✗ ')+it.w;
        document.getElementById('nx').style.display='inline-block';};
      o.appendChild(b);});
    const nx=document.getElementById('nx');
    nx.onclick=()=>{if(i<deck.length-1){i++;locked=false;render();}else{document.onkeydown=null;finish(k,`${title} done`,`Best streak 🔥 ${best}`);}};
    document.onkeydown=(e)=>{const opts=document.querySelectorAll('.opt');
      if(!locked){const n=+e.key;if(n>=1&&n<=opts.length)opts[n-1].click();}
      else if(e.key===' '||e.key==='Enter'){e.preventDefault();nx.click();}};
  }
  render();
}

/* ---- exam practice (typed + self-marked) ---- */
function exam(k){
  const s=DATA[k];let deck=shuffle(s.exam),i=0;
  function render(){const it=deck[i];let marked=false;
    const mk=it.m?`${it.m} mark${it.m>1?'s':''}`:'spoken practice';
    app.innerHTML=`<div class="narrow"><span class="back" onclick="subject('${k}')">← ${s.name}</span>
      <div class="qmeta">Exam Practice · ${i+1}/${deck.length} · ${mk}</div>
      <div class="panel"><div class="q">${it.q}</div>
        <textarea class="ta" id="ans" placeholder="${it.m?'Type your answer, then reveal the model answer to mark it…':'Say your answer aloud, then reveal the model answer to compare…'}"></textarea>
        <button class="btn full" id="rev">Reveal model answer</button>
        <div id="model" style="display:none;margin-top:16px">
          <div class="qmeta">Model answer · ${mk}</div>
          <div class="mans">${it.a}</div>
          <div class="qmeta" style="margin-top:16px">How did you do? (honest = better signal)</div>
          <div class="row" id="mark"><button class="chip good" data-v="1">Got it ✓</button><button class="chip" data-v="1">Partly</button><button class="chip bad" data-v="0">Missed ✗</button></div>
        </div></div></div>`;
    document.getElementById('rev').onclick=e=>{document.getElementById('model').style.display='block';e.target.style.display='none';};
    document.querySelectorAll('#mark .chip').forEach(b=>b.onclick=()=>{
      if(marked)return;marked=true;score(b.dataset.v==='1',k);
      if(i<deck.length-1){i++;render();}else finish(k,'Exam Practice done','You self-marked these — revisit any you missed.');});
  }
  render();
}

/* ---- speaking Q&A (teacher asks, you type) ---- */
function speakqa(k){
  const s=DATA[k];let deck=shuffle(s.speak),i=0;
  function render(){const it=deck[i];let marked=false;
    app.innerHTML=`<div class="narrow"><span class="back" onclick="subject('${k}')">← ${s.name}</span>
      <div class="qmeta">🗣️ Speaking Q&amp;A · ${i+1}/${deck.length}</div>
      <div class="panel"><div class="q">${it.q}</div>
        <div class="lead" style="margin-top:6px">Answer as if your teacher just asked you — type it in French.</div>
        <textarea class="ta" id="ans" placeholder="Ta réponse en français…"></textarea>
        <button class="btn full" id="rev">Reveal model answer</button>
        <div id="model" style="display:none;margin-top:16px">
          <div class="qmeta">Model answer &amp; tips</div>
          <div class="mans">${it.a}</div>
          <div class="qmeta" style="margin-top:16px">How was your answer?</div>
          <div class="row" id="mark"><button class="chip good" data-v="1">Confident ✓</button><button class="chip bad" data-v="0">Needs work</button></div>
        </div></div></div>`;
    document.getElementById('rev').onclick=e=>{document.getElementById('model').style.display='block';e.target.style.display='none';};
    document.querySelectorAll('#mark .chip').forEach(b=>b.onclick=()=>{
      if(marked)return;marked=true;score(b.dataset.v==='1',k);
      if(i<deck.length-1){i++;render();}else finish(k,'Speaking Q&amp;A done','Now say your answers aloud too — fluency comes from repetition.');});
  }
  render();
}

/* ---- fix sorter (ICT) ---- */
function bucket(k){
  const s=DATA[k];let deck=shuffle(s.fixes),i=0,sel=new Set(),done=false;
  function render(){const it=deck[i];
    app.innerHTML=`<div class="narrow"><span class="back" onclick="subject('${k}')">← ${s.name}</span>
      <div class="qmeta">Fix Sorter · ${i+1}/${deck.length}</div>
      <div class="panel"><div class="q">“${it.fix}”</div>
      <div class="lead" style="margin:6px 0 10px">Tap every issue it helps (can be more than one).</div>
      <div id="ch"></div><div class="fb" id="fb"></div><button class="btn" id="act">Check</button></div></div>`;
    const ch=document.getElementById('ch');
    Object.entries(ISSUES).forEach(([kk,lab])=>{const b=document.createElement('button');b.className='chip';b.textContent=lab;b.dataset.k=kk;
      b.onclick=()=>{if(done)return;b.classList.toggle('sel');sel.has(kk)?sel.delete(kk):sel.add(kk);};ch.appendChild(b);});
    document.getElementById('act').onclick=()=>{
      if(!done){done=true;const cor=new Set(it.c);const ok=sel.size===cor.size&&[...sel].every(x=>cor.has(x));score(ok,k);
        document.querySelectorAll('.chip').forEach(c=>{const kk=c.dataset.k;if(cor.has(kk))c.classList.add('good');else if(sel.has(kk))c.classList.add('bad');c.classList.remove('sel');});
        const fb=document.getElementById('fb');fb.className='fb show '+(ok?'ok':'no');fb.innerHTML=(ok?'✓ ':'✗ ')+it.n;
        document.getElementById('act').textContent=i<deck.length-1?'Next →':'Finish';
      }else{if(i<deck.length-1){i++;sel=new Set();done=false;render();}else finish(k,"Fix Sorter done","Crossover trap handled.");}
    };
  }
  render();
}

/* ---- results ---- */
function finish(k,title,msg){
  document.onkeydown=null;
  const T=tot();
  app.innerHTML=`<div class="narrow"><div class="end"><div class="qmeta" style="text-align:center">${title}</div>
    <div class="big">${subPct(k)}%</div><div class="lead" style="margin:0 auto">${ST[k].c}/${ST[k].a} in ${DATA[k].name} · ${T.p}% overall</div>
    <p style="color:var(--mut);font-size:14px;margin-top:12px">${msg}</p>
    <div class="row" style="justify-content:center;margin-top:18px">
      <button class="btn ghost" onclick="subject('${k}')">Back to ${DATA[k].name}</button>
      <button class="btn" onclick="home()">All subjects</button></div></div></div>`;
}

/* ---- boot ---- */
if(typeof DATA==='undefined'){app.innerHTML='<div class="narrow" style="padding-top:40px"><h1>Could not load data.js</h1><p class="lead">Make sure data.js is in the same folder as index.html.</p></div>';}
else{NAME=localStorage.getItem('fa1_name');if(NAME){load();home();}else{welcome();}}
</script>
</body>
